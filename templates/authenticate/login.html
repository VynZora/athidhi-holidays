{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
        <!-- Header Start -->
        <div class="container-fluid bg-breadcrumb">
            <div class="container text-center py-5" style="max-width: 900px;">
                <h3 class="text-white display-3 mb-4">Access Your Account</h3>
                <ol class="breadcrumb justify-content-center mb-0">
                    <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
                    <!-- <li class="breadcrumb-item"><a href="#">Pages</a></li> -->
                    <li class="breadcrumb-item active " style="color: #b1a4a4;">Login</li>
                </ol>    
            </div>
        </div>
        <!-- Header End -->

        <div class="container-fluid login bg-light py-5">
          <div class="container py-5">
              <div class="mx-auto text-center mb-5" style="max-width: 600px;">
                  <h5 class="section-title px-3">Login</h5>
                  <h1 class="mb-0">Welcome Back</h1>
                  <p class="text-muted">Enter your credentials to access your account</p>
              </div>
              <div class="row justify-content-center">
                  <div class="col-lg-6 col-md-8">
                      <div class="bg-white rounded p-5 shadow-lg">
                          <div class="text-center mb-4">
                              <img src="{% static 'img/logo.png' %}" alt="User Avatar" style="width: 100px; height: 100px; background-color: black;" class="rounded-circle border shadow-sm mb-3">
                          
                          </div>
                          <form method="post">
                              {% csrf_token %}
                              <div class="mb-3">
                                  <label for="email" class="form-label">Email Address</label>
                                  <input type="text" name="username" class="form-control border-1 rounded-pill" id="email" placeholder="Enter your email" required>
                              </div>
                              <div class="mb-3">
                                  <label for="password" class="form-label">Password</label>
                                  <input type="password" name="password" class="form-control border-1 rounded-pill" id="password" placeholder="Enter your password" required>
                              </div>
                              <!-- <div class="d-flex justify-content-between align-items-center mb-3">
                                  <a href="" class="text-primary">Forgot Password?</a>
                              </div> -->
                              <div class="mb-3 text-center">
                                  <button type="submit" class="btn  w-100 py-2 rounded-pill" style="background: linear-gradient(100deg, #1B4332, #2D6A4F, #1B4332); color: #fff;">Login</button>
                              </div>
                              <div class="text-center">
                                  <!-- <p class="mb-0">Don't have an account? <a href="#" class="text-primary">Sign Up</a></p> -->
                              </div>
                          </form>
                      </div>
                  </div>
              </div>
          </div>
      </div>
{% endblock %}
